<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>精霊コレクション</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100vh;
  background: #0e0e1a;
  font-family: -apple-system, 'Helvetica Neue', sans-serif;
  color: #fff;
  padding: 12px 10px 40px;
}

.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
  padding: 4px 2px;
}

.title {
  font-size: 19px;
  font-weight: 900;
  color: #fff;
}

.status-ok {
  font-size: 11px;
  color: #4caf50;
  font-weight: 600;
}

.filter-row {
  display: flex;
  gap: 6px;
  margin-bottom: 10px;
  overflow-x: auto;
  padding-bottom: 2px;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.filter-row::-webkit-scrollbar { display: none; }

.tab {
  flex-shrink: 0;
  padding: 7px 16px;
  border-radius: 20px;
  border: 1.5px solid rgba(255,255,255,0.2);
  background: transparent;
  color: #bbb;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  white-space: nowrap;
  transition: all 0.15s;
}
.tab.active {
  background: rgba(140,100,255,0.3);
  border-color: #9c71ff;
  color: #fff;
}

.stats {
  font-size: 12px;
  color: #888;
  margin-bottom: 10px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 5px;
}

.spirit-card {
  background: #1c1c30;
  border-radius: 10px;
  border: 1.5px solid rgba(255,255,255,0.08);
  padding: 5px 4px 7px;
  display: flex;
  flex-direction: column;
  align-items: center;
  transition: border-color 0.1s;
}
.spirit-card[data-owned="true"] {
  border-color: rgba(140,100,255,0.7);
}
.spirit-card[data-maxed="true"] {
  border-color: rgba(255,215,0,0.8);
}

.spirit-img {
  width: 100%;
  aspect-ratio: 4/5;
  border-radius: 7px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 30px;
  margin-bottom: 5px;
}

.spirit-name {
  font-size: 9px;
  color: #ccc;
  text-align: center;
  line-height: 1.3;
  min-height: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 5px;
  width: 100%;
}

.checks {
  display: flex;
  gap: 6px;
  align-items: center;
  justify-content: center;
}

.check-item {
  display: flex;
  align-items: center;
  gap: 2px;
  cursor: pointer;
}

.check-label {
  font-size: 8px;
  color: #888;
  user-select: none;
}

.check-item input[type="checkbox"] {
  width: 13px;
  height: 13px;
  cursor: pointer;
  accent-color: #9c71ff;
  margin: 0;
}
.check-item input.max-cb {
  accent-color: #ffd700;
}

.hidden { display: none !important; }
</style>
</head>
<body>

<div class="header">
  <div class="title">✨ 精霊コレクション</div>
  <div class="status-ok">✓ 読み込み完了</div>
</div>

<div class="filter-row" id="filterRow">
  <button class="tab active" data-filter="all">全リスト</button>
  <button class="tab" data-filter="unowned">未所持</button>
  <button class="tab" data-filter="owned">所持済み</button>
  <button class="tab" data-filter="max">MAX</button>
  <button class="tab" data-filter="notmax">MAX未達</button>
</div>

<div class="stats" id="statsBar"></div>

<div class="grid" id="spiritGrid"></div>

<script>
var TYPES = [
  { id:'fish',    name:'フィッシュ', emoji:'🐡', bg:'linear-gradient(145deg,#a03010,#e8893d)' },
  { id:'water',   name:'水',        emoji:'💧', bg:'linear-gradient(145deg,#1040a0,#40b0f0)' },
  { id:'earth',   name:'地',        emoji:'🌿', bg:'linear-gradient(145deg,#204010,#50a050)' },
  { id:'fire',    name:'炎',        emoji:'🔥', bg:'linear-gradient(145deg,#801000,#e04030)' },
  { id:'wind',    name:'風',        emoji:'🌬️', bg:'linear-gradient(145deg,#006050,#70d0d8)' },
  { id:'thunder', name:'雷',        emoji:'⚡', bg:'linear-gradient(145deg,#504000,#e0c030)' },
  { id:'ice',     name:'氷',        emoji:'❄️', bg:'linear-gradient(145deg,#0a3070,#90c8f0)' },
  { id:'flower',  name:'花',        emoji:'🌸', bg:'linear-gradient(145deg,#700840,#e080b0)' },
  { id:'wood',    name:'木',        emoji:'🌲', bg:'linear-gradient(145deg,#103010,#488048)' },
  { id:'rock',    name:'岩',        emoji:'🪨', bg:'linear-gradient(145deg,#303840,#7090a0)' },
  { id:'sand',    name:'砂',        emoji:'🏜️', bg:'linear-gradient(145deg,#704010,#e0a060)' },
  { id:'light',   name:'光',        emoji:'✨', bg:'linear-gradient(145deg,#806000,#f0e070)' },
  { id:'dark',    name:'闇',        emoji:'🌑', bg:'linear-gradient(145deg,#100020,#601090)' },
  { id:'dream',   name:'夢',        emoji:'💫', bg:'linear-gradient(145deg,#380860,#b070e0)' },
  { id:'star',    name:'星',        emoji:'⭐', bg:'linear-gradient(145deg,#703000,#e0c040)' },
];

var VARIANTS = [
  {
    id: 'base',
    nameFn: function(t) { return t.name + 'の精霊'; },
    bgFn: function(t) { return t.bg; }
  },
  {
    id: 'gold',
    nameFn: function() { return 'ゴールド'; },
    bgFn: function() { return 'linear-gradient(145deg,#6a4800,#c8960a)'; }
  },
  {
    id: 'gummy',
    nameFn: function() { return 'グミ'; },
    bgFn: function() { return 'linear-gradient(145deg,#800838,#e05890)'; }
  },
  {
    id: 'galaxy',
    nameFn: function() { return 'ギャラクシー'; },
    bgFn: function() { return 'linear-gradient(145deg,#08001a,#3a0870)'; }
  },
];

var SPIRITS = [];
TYPES.forEach(function(t) {
  VARIANTS.forEach(function(v) {
    SPIRITS.push({
      id: t.id + '_' + v.id,
      name: v.nameFn(t),
      emoji: t.emoji,
      bg: v.bgFn(t),
    });
  });
});
SPIRITS.push({
  id: 'rainbow_special',
  name: '虹の精霊',
  emoji: '🌈',
  bg: 'linear-gradient(145deg,#800000,#3060c0,#108030,#601090)',
});

var state = {};
try { state = JSON.parse(localStorage.getItem('ft_spirits_v1') || '{}'); } catch(e) {}

function save() {
  try { localStorage.setItem('ft_spirits_v1', JSON.stringify(state)); } catch(e) {}
}

function getState(id) {
  if (!state[id]) state[id] = { owned: false, max: false };
  return state[id];
}

function updateStats() {
  var owned = 0, max = 0;
  SPIRITS.forEach(function(s) {
    var st = getState(s.id);
    if (st.owned) owned++;
    if (st.max) max++;
  });
  document.getElementById('statsBar').textContent =
    '所持: ' + owned + '/' + SPIRITS.length + ' 　MAX: ' + max + ' 　全体: ' + SPIRITS.length;
}

var currentFilter = 'all';

function cardVisible(id) {
  var st = getState(id);
  if (currentFilter === 'unowned') return !st.owned;
  if (currentFilter === 'owned')   return st.owned;
  if (currentFilter === 'max')     return st.max;
  if (currentFilter === 'notmax')  return !st.max;
  return true;
}

function buildGrid() {
  var grid = document.getElementById('spiritGrid');
  grid.innerHTML = '';

  SPIRITS.forEach(function(s) {
    var st = getState(s.id);

    var card = document.createElement('div');
    card.className = 'spirit-card';
    card.dataset.id = s.id;
    card.dataset.owned = st.owned;
    card.dataset.maxed = st.max;

    var img = document.createElement('div');
    img.className = 'spirit-img';
    img.style.background = s.bg;
    img.textContent = s.emoji;
    card.appendChild(img);

    var nameEl = document.createElement('div');
    nameEl.className = 'spirit-name';
    nameEl.textContent = s.name;
    card.appendChild(nameEl);

    var checks = document.createElement('div');
    checks.className = 'checks';

    var ownLabel = document.createElement('label');
    ownLabel.className = 'check-item';
    var ownCb = document.createElement('input');
    ownCb.type = 'checkbox';
    ownCb.checked = st.owned;
    ownCb.addEventListener('change', (function(spiritId, cardEl) {
      return function() {
        var s2 = getState(spiritId);
        s2.owned = this.checked;
        cardEl.dataset.owned = this.checked;
        save();
        updateStats();
        if (!cardVisible(spiritId)) cardEl.classList.add('hidden');
      };
    })(s.id, card));
    var ownText = document.createElement('span');
    ownText.className = 'check-label';
    ownText.textContent = '所持';
    ownLabel.appendChild(ownCb);
    ownLabel.appendChild(ownText);
    checks.appendChild(ownLabel);

    var maxLabel = document.createElement('label');
    maxLabel.className = 'check-item';
    var maxCb = document.createElement('input');
    maxCb.type = 'checkbox';
    maxCb.className = 'max-cb';
    maxCb.checked = st.max;
    maxCb.addEventListener('change', (function(spiritId, cardEl) {
      return function() {
        var s2 = getState(spiritId);
        s2.max = this.checked;
        cardEl.dataset.maxed = this.checked;
        save();
        updateStats();
        if (!cardVisible(spiritId)) cardEl.classList.add('hidden');
      };
    })(s.id, card));
    var maxText = document.createElement('span');
    maxText.className = 'check-label';
    maxText.textContent = 'MAX';
    maxLabel.appendChild(maxCb);
    maxLabel.appendChild(maxText);
    checks.appendChild(maxLabel);

    card.appendChild(checks);
    grid.appendChild(card);
  });

  updateStats();
}

document.getElementById('filterRow').addEventListener('click', function(e) {
  var tab = e.target.closest('.tab');
  if (!tab) return;
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  tab.classList.add('active');
  currentFilter = tab.dataset.filter;
  document.querySelectorAll('.spirit-card').forEach(function(card) {
    var visible = cardVisible(card.dataset.id);
    card.classList.toggle('hidden', !visible);
  });
});

buildGrid();
</script>
</body>
</html>
